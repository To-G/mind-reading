    <style>

        html, body {
            width: 100%;
            /* height: 100%; */
        }

        .page-loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            /* background: #000; */
            /* background: rgba(0, 0, 0, 0.2); */
        }

        .page-loading span {
            color: #666;
            font-size: 1.4vw;
            font-family: "Open Sans",sans-serif;
            /* margin-bottom: 2vw; */
            font-weight: 400;
            padding-left: 1vw;
        }

        .page-loading .loading {
            width: 6vw;
            height: 6vw;
            /* height: 100px; */
            position: relative;
        }

.page-loading .shape {
    width: 25%;
    height: 25%;
    position: absolute;
    border-radius: 50%;
    top: 40%;
}

.page-loading .shape-1 {
  background-color: #8bed3a;
  animation: animationShape1 1s ease infinite;
}

.page-loading .shape-2 {
  background-color: #fcd837;
  left: 25%;
}

.page-loading .shape-3 {
  background-color: #f9a11f;
  left: 50%;
}

.page-loading .shape-4 {
  background-color: #f27c21;
  left: 75%;
  animation: animationShape4 1s ease infinite;
}

@media screen and (max-width: 800px) { 

  .page-loading span {
        color: #666;
        font-size: 2.8vw;
        font-family: "Open Sans",sans-serif;
        /* margin-bottom: 2vw; */
        font-weight: 400;
        padding-left: 2vw;
    }

    .page-loading .loading {
        width: 12vw;
        height: 12vw;
        /* height: 100px; */
        position: relative;
    }

}

@keyframes animationShape1 {
  0% {
    left: -25%;
    top: 5px;
  }

  25% {
    left: 0;
    top: 40%;
  }

  50% {
    left: 0;
    top: 40%;
  }

  75% {
    left: 0;
    top: 40%;
  }

  100% {
    left: -25%;
    top: 5px;
  }
}

@keyframes animationShape4 {
  0% {
    left: 75%;
    top: 40%;
  }

  25% {
    left: 75%;
    top: 40%;
  }

  50% {
    left: 125%;
    top: 5px;
  }

  75% {
    left: 75%;
    top: 40%;
  }

  100% {
    left: 75%;
    top: 40%;
  }
}
    </style>

    <body>
        <div id="app"></div>
        <audio id="BgmAudio" loop></audio>
        <audio id="ActAudio"></audio>
        <div class="page-loading">
            <span>LOADING</span>
            <div class="loading">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
              </div>
        </div>
    </body>
